# Pre-Approval Appeals Form — config-driven definition.
# Source: docs/Project-Brief.pdf §4, §5 and the real "Pre-Approval Appeals
# Form" (see samples/Sample-10 — an appeal of a denied Community Class
# application). An appeal is not a new checklist from scratch: per the brief,
# it re-runs the base category's website checks (here, Community Classes —
# see `appeal_of` below) and additionally frames the result against the
# stated denial reason. The web-verifiable criteria below intentionally
# mirror config/checklists/community-classes.yaml; if that file's criteria
# change, mirror the change here too (the engine does not currently merge
# configs automatically — see docs/adding-a-checklist.md).

category_id: appeals
display_name: "Pre-Approval Appeal"
appeal_of: community-classes

form_template_signature:
  - "Pre-Approval Appeals Form"
  - "Reason for the denial"

item_name_field: class_name
fee_field: fee_per_session

fields:
  - { id: participant_name, label: "Participant's Name", type: string, pii: true }
  - { id: participant_age, label: "Participant's Age", type: number }
  - { id: fi_coordinator_name, label: "FI Coordinator Name", type: string }
  - { id: broker_name, label: "Broker Name", type: string }
  - { id: class_name, label: "Class Name", type: string }
  - { id: provider_name, label: "Name of Provider/Vendor", type: string }
  - { id: webpage_url, label: "Link to Webpage / Place of Publication", type: url }
  - { id: subject_area, label: "Subject Area/Skill", type: string }
  - { id: fee_per_session, label: "Fee per Session", type: currency }
  - { id: duration_per_session, label: "Duration per Session", type: string }
  - { id: denial_date, label: "Date of Denial", type: date, required: false }
  - { id: denial_reason, label: "Reason for the denial", type: string }
  - { id: appeal_justification, label: "Justification for Appeal", type: string }

criteria:
  # --- Website-verifiable (re-running the Community Class checks) ---
  - id: open_to_public
    question: "Is the class open to and attended by the broader public?"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: open to the public"

  - id: published_fees
    question: "Does the class have published fees (a public price is visible)?"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: published fees"

  - id: fees_identical_opwdd
    question: "Are the fees identical for both OPWDD and non-OPWDD individuals (no segregated pricing)?"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: single public price (no segregated pricing found)"
    notes: >
      Public sites rarely mention OPWDD explicitly. Absence of a second,
      disability-specific price is treated as supporting evidence, not proof —
      default to Needs Review unless the page is unambiguous.

  - id: subject_based
    question: "Is the class subject based (art, dance, martial arts, cooking, etc.)?"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: subject area / class description"

  - id: no_college_credit
    question: "Does the class provide college credits? (must be NO)"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: course/credit description"

  - id: not_clinical
    question: "Is the class clinical in nature (therapy)? (must be NO)"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: class description (non-clinical)"

  - id: published_schedule
    question: "Is there a published schedule of the class?"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: published schedule"

  - id: fee_match
    question: "Does the published fee match the \"Fee per Session\" stated on the form?"
    verifiable: web
    check_type: fee_match
    evidence_label: "Evidence: fee comparison"
    caps: { tolerance_pct: 5 }

  # --- Appeal-specific ---
  - id: appeal_evidence_provenance
    question: "Does the appeal justification rely on evidence not verifiable from the public website?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Appeal review"
    explanation: >
      This tool only evaluates the provider's public website. Any document,
      rate sheet, or other material attached to or described in the appeal
      justification must be independently reviewed by the appeal committee —
      it is not, and cannot be, verified by this automated report. Compare
      the website findings above against the stated denial reason and the
      appellant's justification to decide whether the original denial should
      be reversed.

  # --- Internal / not website-verifiable (same as Community Classes) ---
  - id: budget_approved
    question: "Are community classes currently approved in the budget?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Budget and funding"
    explanation: "Requires the participant's approved IDGS/Self-Direction budget record showing community classes as an approved spending category."

  - id: community_inclusion
    question: "Does the class provide opportunity for community inclusion?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Participant plan and outcomes"
    explanation: "Requires the participant's Life Plan narrative and reviewer judgment on whether this specific class supports a community-inclusion goal."

  - id: health_safety_fit
    question: "Does the class accommodate the individual's health and/or safety needs?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Participant plan and outcomes"
    explanation: "Requires participant-specific health/safety documentation from the Life Plan — not published anywhere on a public website."

  - id: independence_substitute
    question: "Does the class increase independence or substitute for human assistance?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Participant plan and outcomes"
    explanation: "Requires the participant's Life Plan goals and reviewer judgment on how this class relates to them."

  - id: exclusive_benefit
    question: "Is the class provided exclusively for the benefit of the participant? (must be NO)"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Provider and programme eligibility"
    explanation: "Requires confirmation from the FI Coordinator/Broker that the class benefits the participant only, not shared with family members."

  - id: dd_only_setting
    question: "Is the class given in a setting accessed only by people with Developmental Disabilities? (must be NO)"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Provider and programme eligibility"
    explanation: "A provider's public marketing page doesn't reliably disclose facility-access policy; requires reviewer follow-up with the provider or program documentation."

  - id: opwdd_staff_run
    question: "Is the class run by OPWDD or a provider-agency staff acting in their official capacities? (must be NO)"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Provider and programme eligibility"
    explanation: "Requires internal knowledge of OPWDD-affiliated staff/providers — not determinable from the class's public website."

  - id: opwdd_grounds
    question: "Is the class located on grounds where OPWDD services are normally provided? (must be NO)"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Provider and programme eligibility"
    explanation: "Requires cross-referencing the agency's internal list of OPWDD-certified locations, which isn't public data."

  - id: duplicates_medicaid_services
    question: "Does the class duplicate any Medicaid state plan or HCBS waiver services?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Duplication of services"
    explanation: "Requires the participant's Medicaid/HCBS waiver service authorization records to check for overlap."

  - id: duplicates_boe_services
    question: "Does the class duplicate services given through the Board of Education for school-aged children?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Duplication of services"
    explanation: "Requires the participant's school/Board of Education IEP or service records."

  - id: reimbursed_directly
    question: "Is the class being reimbursed directly (W9 required)?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Reimbursement and invoicing"
    explanation: "Requires the participant's chosen payment method and, if reimbursed directly, a completed W-9 on file."
