# Other Than Personal Services (OTPS) Pre-Approval Form — config-driven
# definition. Source: docs/Project-Brief.pdf §4, §5 and the real "Other Than
# Personal Services (OTPS) Pre-Approval Form" (see samples/Sample-08 —
# weighted blanket, checked against the OTPS-specific exclusion list, which
# is deliberately different from the HRI exclusion list). Adding a new
# category = adding a new file like this one; the engine has no
# category-specific code.

category_id: otps
display_name: "Other Than Personal Services (OTPS)"

form_template_signature:
  - "Other Than Personal Services (OTPS) Pre-Approval Form"
  - "Is the item on the OTPS exclusion list"

item_name_field: item_requested

fields:
  - { id: participant_name, label: "Participant's Name", type: string, pii: true }
  - { id: participant_age, label: "Participant's Age", type: number }
  - { id: fi_coordinator_name, label: "FI Coordinator Name", type: string }
  - { id: broker_name, label: "Broker Name", type: string }
  - { id: budget_line, label: "Budget Line Requesting", type: string, required: false }
  - { id: item_requested, label: "Item Requested", type: string }
  - { id: item_link, label: "Link to the Item", type: url }
  - { id: safety_features, label: "Safety features for the item", type: string, required: false }

criteria:
  # --- Website-verifiable ---
  - id: item_exists_with_price
    question: "Does the linked page show the item exists with a visible price?"
    verifiable: web
    check_type: llm_judgment
    evidence_label: "Evidence: item listing and price"

  - id: exclusion_list
    question: "Is the item on the OTPS exclusion list? (see guidelines)"
    verifiable: web
    check_type: exclusion_list
    evidence_label: ""
    exclusion_list:
      - "medical visit co-pays"
      - "hospitalization/nursing-home expenses"
      - "illegal items/activities"
      - "cable television"
      - "common household supplies (paper towels, wipes, soap)"
      - "experimental treatments"
      - "landlord/homeowner repairs"
      - "a self-directing person's activity fees/supplies for an activity or community class"
      - "rental cars (not vehicles leased in the participant's name)"
      - "vehicle purchases/payments"
      - "legal fees"
      - "housing costs above the housing subsidy"
      - "experimental therapies"

  # --- Internal / not website-verifiable ---
  - id: budget_approved_independence
    question: "Is 'Other goods & services that increase independence' approved in the budget?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Budget and funding"
    explanation: "Requires the participant's approved Self-Direction budget record for this OTPS budget line."

  - id: budget_approved_health_safety
    question: "Is 'Other goods & services that increase health and safety' approved in the budget?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Budget and funding"
    explanation: "Requires the participant's approved Self-Direction budget record for this OTPS budget line."

  - id: lp_goal_related
    question: "Is the item related to a need or goal identified in the Life Plan?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Participant plan and outcomes"
    explanation: "Requires the participant's Life Plan and reviewer judgment on whether this item supports an identified need or goal."

  - id: increases_independence_or_safety
    question: "Will the item increase the independence and/or health and safety of the individual?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Participant plan and outcomes"
    explanation: "Requires participant-specific context from the Life Plan — not determinable from a product page."

  - id: exclusive_to_participant
    question: "Is the item exclusively needed for the participant?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Provider and programme eligibility"
    explanation: "Requires confirmation from the FI Coordinator/Broker that the item is not shared with other household members."

  - id: other_funding
    question: "Can the item be funded through other sources? (must be NO)"
    form_question: "Can the item be funded through other sources?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Duplication of services"
    explanation: "Requires knowledge of other funding sources (e.g. E-mods/assistive technology) available to the participant — not determinable from a product page."

  - id: not_already_bought
    question: "Was the same item bought already in this budget year? (must be NO)"
    form_question: "Was the same item bought already in this budget year?"
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Duplication of services"
    explanation: "Requires the participant's purchase history for the current budget year, which isn't available from the website or this form alone."

  - id: annual_cap_3000
    question: "Invoice-rule context: OTPS is capped at $3,000 per budget year."
    verifiable: internal
    check_type: rule
    evidence_label: ""
    group: "Reimbursement and invoicing"
    explanation: "Requires cumulative OTPS spending records for the current budget year, which aren't available from a single submission or the item's page."
